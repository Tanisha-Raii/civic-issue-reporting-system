<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stored Complaints – Worker Panel</title>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #00ff88;
      text-shadow: 0 0 8px #00ff88;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #161b22;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #2c313a;
      text-align: left;
      cursor: pointer;
    }

    th {
      background-color: #00ff88;
      color: #000;
      cursor: default;
    }

    tr:hover {
      background-color: #1d242d;
    }

    .delete-btn {
      background: #ff4d4d;
      color: #000;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .delete-btn:hover {
      background: #ff1a1a;
    }

    .no-data {
      text-align: center;
      margin-top: 20px;
      color: #58a6ff;
    }

    /* MODAL WINDOW */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #161b22;
      padding: 20px;
      width: 90%;
      max-width: 500px;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,255,136,0.2);
    }

    .modal-content h2 {
      color: #00ff88;
      margin-bottom: 10px;
      text-shadow: 0 0 6px #00ff88;
    }

    .modal-content img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }

    .close-btn {
      background: #00ff88;
      color: #000;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
      float: right;
    }

    .close-btn:hover {
      background: #00cc6a;
    }
  </style>
</head>

<body>

  <h1>Registered Complaints</h1>

  <table id="complaintTable">
    <thead>
      <tr>
        <th>Address</th>
        <th>Issue Type</th>
        <th>Severity</th>
        <th>Delete</th>
      </tr>
    </thead>
    <tbody id="complaintBody"></tbody>
  </table>

  <p class="no-data" id="noDataMsg">No complaints submitted yet.</p>

  <!-- MODAL POPUP -->
  <div class="modal" id="detailsModal">
    <div class="modal-content">
      <h2 id="modalTitle"></h2>
      <p><strong>Address:</strong> <span id="modalAddress"></span></p>
      <p><strong>Issue:</strong> <span id="modalIssue"></span></p>
      <p><strong>Severity:</strong> <span id="modalSeverity"></span></p>
      <p><strong>Description:</strong><br> <span id="modalDescription"></span></p>
      <img id="modalImage" style="display:none;">
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    let complaints = [];

    function loadComplaints() {
      complaints = JSON.parse(localStorage.getItem('complaints')) || [];
      const tbody = document.getElementById('complaintBody');
      const noDataMsg = document.getElementById('noDataMsg');

      tbody.innerHTML = "";

      if (complaints.length === 0) {
        noDataMsg.style.display = 'block';
        return;
      }

      noDataMsg.style.display = 'none';

      complaints.forEach((c, index) => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${c.address}</td>
          <td>${c.issueType}</td>
          <td>${c.severity}</td>
          <td><button class="delete-btn" onclick="deleteComplaint(${index}, event)">Delete</button></td>
        `;

        // clicking anywhere on the row except delete button → open popup
        row.addEventListener('click', (e) => {
          if (!e.target.classList.contains('delete-btn')) {
            openModal(c);
          }
        });

        tbody.appendChild(row);
      });
    }

    function deleteComplaint(index, event) {
      event.stopPropagation(); // prevent popup from opening
      if (confirm("Are you sure you want to delete this complaint?")) {
        complaints.splice(index, 1);
        localStorage.setItem('complaints', JSON.stringify(complaints));
        loadComplaints();
      }
    }

    function openModal(c) {
      document.getElementById('modalTitle').innerText = "Complaint Details";
      document.getElementById('modalAddress').innerText = c.address;
      document.getElementById('modalIssue').innerText = c.issueType;
      document.getElementById('modalSeverity').innerText = c.severity;
      document.getElementById('modalDescription').innerText = c.description;

      const img = document.getElementById('modalImage');
      if (c.image) {
        img.src = c.image;
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }

      document.getElementById('detailsModal').style.display = "flex";
    }

    function closeModal() {
      document.getElementById('detailsModal').style.display = "none";
    }

    window.onload = loadComplaints;
  </script>

</body>
</html>
